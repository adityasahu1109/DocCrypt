<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocCrypt - Phase 1 Test Harness</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 800px; margin: auto; line-height: 1.6; }
        .control-group { margin-bottom: 20px; border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #fafafa; }
        textarea { width: 100%; height: 100px; margin-top: 10px; font-family: monospace; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        h1, h2 { margin-top: 0; }
        h2 { font-size: 1.2rem; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    </style>
</head>
<body>
    <h1>DocCrypt - Cryptographic Core Test Harness</h1>

    <div class="control-group">
        <h2>1. Key Generation</h2>
        <button id="btnGenerateKeys">Generate RSA Key Pair</button>
        <textarea id="outputPublicKey" readonly placeholder="Public Key representation will appear here..."></textarea>
    </div>

    <div class="control-group">
        <h2>2. Data & Hashing</h2>
        <textarea id="inputData" placeholder="Enter text to hash and sign...">{"message": "Hello DocCrypt World", "documentId": "12345"}</textarea>
        <br>
        <button id="btnHashData" style="margin-top: 10px;">Hash Data (SHA-256)</button>
        <textarea id="outputHash" readonly placeholder="SHA-256 Hash will appear here..."></textarea>
    </div>

    <div class="control-group">
        <h2>3. Digital Signing</h2>
        <button id="btnSignData" disabled>Sign Data with Private Key</button>
        <textarea id="outputSignature" readonly placeholder="Base64 Signature will appear here..."></textarea>
    </div>

    <div class="control-group">
        <h2>4. Verification</h2>
        <button id="btnVerifyData" disabled>Verify Signature with Public Key</button>
        <p><strong>Verification Result: </strong><span id="outputVerificationResult">Pending...</span></p>
    </div>

    <script src="crypto.js"></script>
</body>
</html>
